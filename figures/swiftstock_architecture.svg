<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="viewGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="networkGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serviceGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFF3E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE0B2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dataGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FCE4EC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8BBD9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#999" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="800" fill="#FAFAFA"/>

  <!-- 标题 -->
  <text x="400" y="40" font-family="Microsoft YaHei, sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#333">SwiftStock 智能仓储管理系统架构图</text>
  <line x1="100" y1="60" x2="700" y2="60" stroke="#1976D2" stroke-width="2"/>

  <!-- ==================== 第1层：视图层 ==================== -->
  <g transform="translate(50, 85)">
    <rect x="0" y="0" width="700" height="40" rx="5" fill="#4CAF50"/>
    <text x="350" y="27" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">1. 视图层 (View Layer)</text>

    <rect x="0" y="48" width="700" height="110" rx="8" fill="url(#viewGradient)" stroke="#81C784" stroke-width="2"/>

    <rect x="30" y="65" width="160" height="78" rx="8" fill="white" stroke="#4CAF50" stroke-width="2" filter="url(#shadow)"/>
    <rect x="30" y="65" width="160" height="30" rx="5" fill="#4CAF50"/>
    <text x="110" y="85" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Vue.js 3</text>
    <text x="45" y="108" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• Vue 3.5</text>
    <text x="45" y="122" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• Vite 7</text>

    <rect x="205" y="65" width="160" height="78" rx="8" fill="white" stroke="#4CAF50" stroke-width="2" filter="url(#shadow)"/>
    <rect x="205" y="65" width="160" height="30" rx="5" fill="#4CAF50"/>
    <text x="285" y="85" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Element Plus</text>
    <text x="220" y="108" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• UI组件库 2.13</text>
    <text x="220" y="122" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• 图标组件</text>

    <rect x="380" y="65" width="160" height="78" rx="8" fill="white" stroke="#4CAF50" stroke-width="2" filter="url(#shadow)"/>
    <rect x="380" y="65" width="160" height="30" rx="5" fill="#4CAF50"/>
    <text x="460" y="85" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Axios + ECharts</text>
    <text x="395" y="108" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• HTTP客户端 1.13</text>
    <text x="395" y="122" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• 图表库 6.0</text>

    <rect x="555" y="65" width="165" height="78" rx="8" fill="white" stroke="#4CAF50" stroke-width="2" filter="url(#shadow)"/>
    <rect x="555" y="65" width="165" height="30" rx="5" fill="#4CAF50"/>
    <text x="637" y="85" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Vue Router</text>
    <text x="570" y="108" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• 路由管理 4.6</text>
    <text x="570" y="122" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• vue-echarts 8.0</text>
  </g>

  <!-- 连接线1-2 -->
  <line x1="400" y1="263" x2="400" y2="288" stroke="#666" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="400,288 395,278 405,278" fill="#666"/>

  <!-- ==================== 第2层：网络传输层 ==================== -->
  <g transform="translate(50, 288)">
    <rect x="0" y="0" width="700" height="40" rx="5" fill="#2196F3"/>
    <text x="350" y="27" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">2. 网络传输层 (Network Transport Layer)</text>

    <rect x="0" y="48" width="700" height="95" rx="8" fill="url(#networkGradient)" stroke="#64B5F6" stroke-width="2"/>

    <rect x="30" y="62" width="220" height="66" rx="8" fill="white" stroke="#2196F3" stroke-width="2" filter="url(#shadow)"/>
    <rect x="30" y="62" width="220" height="30" rx="5" fill="#2196F3"/>
    <text x="140" y="82" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">HTTP/HTTPS</text>
    <text x="45" y="105" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• RESTful API</text>
    <text x="45" y="119" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• JSON 数据交换</text>

    <rect x="265" y="62" width="220" height="66" rx="8" fill="white" stroke="#2196F3" stroke-width="2" filter="url(#shadow)"/>
    <rect x="265" y="62" width="220" height="30" rx="5" fill="#2196F3"/>
    <text x="375" y="82" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">CORS</text>
    <text x="280" y="105" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• 跨域资源共享</text>
    <text x="280" y="119" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• 请求拦截与分发</text>

    <rect x="500" y="62" width="220" height="66" rx="8" fill="white" stroke="#2196F3" stroke-width="2" filter="url(#shadow)"/>
    <rect x="500" y="62" width="220" height="30" rx="5" fill="#2196F3"/>
    <text x="610" y="82" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">JWT + Spring Security</text>
    <text x="515" y="105" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• Token 认证 (java-jwt)</text>
    <text x="515" y="119" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• 接口权限控制</text>
  </g>

  <!-- 连接线2-3 -->
  <line x1="400" y1="451" x2="400" y2="476" stroke="#666" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="400,476 395,466 405,466" fill="#666"/>

  <!-- ==================== 第3层：服务层 ==================== -->
  <g transform="translate(50, 476)">
    <rect x="0" y="0" width="700" height="40" rx="5" fill="#FF9800"/>
    <text x="350" y="27" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">3. 服务层 (Service Layer)</text>

    <rect x="0" y="48" width="700" height="155" rx="8" fill="url(#serviceGradient)" stroke="#FFB74D" stroke-width="2"/>

    <!-- 第一行 -->
    <rect x="30" y="65" width="155" height="123" rx="8" fill="white" stroke="#FF9800" stroke-width="2" filter="url(#shadow)"/>
    <rect x="30" y="65" width="155" height="30" rx="5" fill="#FF9800"/>
    <text x="107" y="85" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Spring Boot</text>
    <text x="45" y="108" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• 核心框架 3.4</text>
    <text x="45" y="122" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• Spring MVC</text>
    <text x="45" y="136" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• 内嵌 Tomcat</text>
    <text x="45" y="150" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• @Transactional</text>

    <rect x="200" y="65" width="155" height="123" rx="8" fill="white" stroke="#FF9800" stroke-width="2" filter="url(#shadow)"/>
    <rect x="200" y="65" width="155" height="30" rx="5" fill="#FF9800"/>
    <text x="277" y="85" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Spring Security</text>
    <text x="215" y="108" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• 认证过滤器</text>
    <text x="215" y="122" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• 权限授权</text>
    <text x="215" y="136" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• 安全配置</text>
    <text x="215" y="150" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• BCrypt加密</text>

    <rect x="370" y="65" width="155" height="123" rx="8" fill="white" stroke="#FF9800" stroke-width="2" filter="url(#shadow)"/>
    <rect x="370" y="65" width="155" height="30" rx="5" fill="#FF9800"/>
    <text x="447" y="85" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">MyBatis</text>
    <text x="385" y="108" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• 持久层框架 3.0</text>
    <text x="385" y="122" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• 动态 SQL</text>
    <text x="385" y="136" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• Mapper XML</text>
    <text x="385" y="150" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• 结果映射</text>

    <rect x="540" y="65" width="175" height="123" rx="8" fill="white" stroke="#FF9800" stroke-width="2" filter="url(#shadow)"/>
    <rect x="540" y="65" width="175" height="30" rx="5" fill="#FF9800"/>
    <text x="627" y="85" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Spring AI + DeepSeek</text>
    <text x="555" y="108" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• 大模型集成 1.1</text>
    <text x="555" y="122" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• ChatClient</text>
    <text x="555" y="136" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• DeepSeek API</text>
    <text x="555" y="150" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">• @Async 异步</text>
  </g>

  <!-- 连接线3-4 -->
  <line x1="400" y1="719" x2="400" y2="744" stroke="#666" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="400,744 395,734 405,734" fill="#666"/>

  <!-- ==================== 第4层：数据层 ==================== -->
  <g transform="translate(50, 744)">
    <rect x="0" y="0" width="700" height="40" rx="5" fill="#E91E63"/>
    <text x="350" y="27" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">4. 数据层 (Data Layer)</text>

    <rect x="0" y="48" width="700" height="55" rx="8" fill="url(#dataGradient)" stroke="#F48FB1" stroke-width="2"/>

    <rect x="30" y="60" width="340" height="30" rx="5" fill="#E91E63"/>
    <text x="200" y="80" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">MySQL 8.0 关系型数据库</text>

    <rect x="385" y="60" width="340" height="30" rx="5" fill="#E91E63"/>
    <text x="555" y="80" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">HikariCP 连接池</text>
  </g>

  <!-- 图例 -->
  <g transform="translate(50, 865)">
    <rect x="0" y="0" width="700" height="30" rx="5" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="1"/>
    <text x="20" y="20" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#555">图例：</text>
    <rect x="70" y="7" width="15" height="15" fill="#4CAF50" rx="2"/>
    <text x="90" y="19" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">视图层</text>
    <rect x="150" y="7" width="15" height="15" fill="#2196F3" rx="2"/>
    <text x="170" y="19" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">网络层</text>
    <rect x="230" y="7" width="15" height="15" fill="#FF9800" rx="2"/>
    <text x="250" y="19" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">服务层</text>
    <rect x="310" y="7" width="15" height="15" fill="#E91E63" rx="2"/>
    <text x="330" y="19" font-family="Microsoft YaHei, sans-serif" font-size="11" fill="#333">数据层</text>
  </g>
</svg>
