<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520">
  <style>
    .box { fill:#fff; stroke:#0b5ed7; stroke-width:2; rx:6; }
    .text { font-family: Arial, sans-serif; font-size:13px; fill:#0b1220; }
    .small { font-size:12px; fill:#475569; }
    .arrow { stroke:#334155; stroke-width:2; fill:none; marker-end:url(#a); }
  </style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
  </defs>

  <rect class="box" x="40" y="30" width="220" height="60"/>
  <text class="text" x="150" y="68" text-anchor="middle">数据采集（订单/库存/促销）</text>

  <rect class="box" x="260" y="130" width="220" height="60"/>
  <text class="text" x="370" y="168" text-anchor="middle">特征工程与预处理</text>

  <rect class="box" x="260" y="230" width="220" height="60"/>
  <text class="text" x="370" y="268" text-anchor="middle">AiForecastService 调用模型</text>

  <rect class="box" x="260" y="330" width="220" height="60"/>
  <text class="text" x="370" y="368" text-anchor="middle">结合规则生成补货建议</text>

  <rect class="box" x="40" y="430" width="440" height="60"/>
  <text class="text" x="260" y="468" text-anchor="middle">生成补货列表 → 管理员审核 → 生成采购单</text>

  <path class="arrow" d="M150,90 L150,130"/>
  <path class="arrow" d="M370,190 L370,230"/>
  <path class="arrow" d="M370,290 L370,330"/>
  <path class="arrow" d="M370,390 L260,430"/>

  <text class="small" x="480" y="40">外部事件：促销/节假日</text>
  <text class="small" x="40" y="500">图：AI 补货推荐流程示意</text>
</svg>

