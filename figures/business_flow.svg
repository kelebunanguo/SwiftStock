<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="380" height="980" viewBox="0 0 380 980" role="img" aria-label="图 2-1 SwiftStock 系统业务流程示意图">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#0b2a4a"/>
    </marker>
  </defs>
  <style>
    .box { fill:#143e6b; stroke:#0b2740; stroke-width:2; rx:10; }
    .box-light { fill:#4ea8ff; stroke:#1b6fd3; stroke-width:1.6; rx:8; }
    .text-white { font-family: "Helvetica Neue", Arial, sans-serif; font-size:13px; fill:#ffffff; }
    .text-dark { font-family: "Helvetica Neue", Arial, sans-serif; font-size:12px; fill:#0b1220; }
    .small { font-family: Arial, sans-serif; font-size:11px; fill:#b7c6d6; }
    .arrow { stroke:#0b2a4a; stroke-width:2.4; fill:none; marker-end:url(#arrow); }
    .diamond { fill:#0ea5e9; stroke:#064e7a; stroke-width:1.6; }
    .note { font-family: Arial, sans-serif; font-size:11px; fill:#64748b; }
  </style>

  <!-- Start -->
  <rect class="box-light" x="140" y="10" width="100" height="42" rx="21"/>
  <text class="text-dark" x="190" y="37" text-anchor="middle">开始</text>
  <path class="arrow" d="M190 52 L190 72" />

  <!-- New product / maintenance -->
  <rect class="box-light" x="90" y="72" width="200" height="56" rx="10"/>
  <text class="text-dark" x="190" y="96" text-anchor="middle">新品上架 / 商品维护</text>
  <text class="text-dark" x="190" y="112" text-anchor="middle">含 AI 智能生成商品描述</text>
  <path class="arrow" d="M190 128 L190 152" />

  <!-- Branch: supplier supply (left) -->
  <rect class="box" x="30" y="160" width="140" height="56" rx="8"/>
  <text class="text-white" x="100" y="187" text-anchor="middle">供应商供货</text>
  <text class="small" x="100" y="203" text-anchor="middle">入库记录</text>
  <path class="arrow" d="M160 188 L170 188" />

  <!-- Branch: receive order (right) -->
  <rect class="box" x="210" y="160" width="140" height="56" rx="8"/>
  <text class="text-white" x="280" y="187" text-anchor="middle">接收订单</text>
  <path class="arrow" d="M230 216 L190 240" />

  <!-- Inventory increase from supplier -->
  <rect class="box" x="30" y="236" width="140" height="56" rx="8"/>
  <text class="text-white" x="100" y="263" text-anchor="middle">库存增加</text>
  <path class="arrow" d="M100 216 L100 236" />

  <!-- Order processing -->
  <rect class="box" x="170" y="236" width="180" height="72" rx="8"/>
  <text class="text-white" x="260" y="256" text-anchor="middle">订单处理</text>
  <text class="small" x="260" y="274" text-anchor="middle">(创建、状态流转、订单项管理)</text>
  <path class="arrow" d="M260 308 L260 328" />

  <!-- Order status diamond -->
  <g transform="translate(200,328)">
    <polygon class="diamond" points="60,0 90,30 60,60 30,30"/>
    <text class="text-white" x="60" y="36" text-anchor="middle">订单状态？</text>
  </g>
  <path class="arrow" d="M260 364 L260 388" />

  <!-- From diamond: normal -> out stock -->
  <rect class="box" x="170" y="400" width="180" height="56" rx="8"/>
  <text class="text-white" x="260" y="430" text-anchor="middle">出库操作 / 库存扣减</text>
  <path class="arrow" d="M260 388 L260 400" />

  <!-- From diamond: refund -> stock increase (left) -->
  <path class="arrow" d="M235 344 L190 300 L120 300" />
  <rect class="box" x="30" y="312" width="140" height="56" rx="8"/>
  <text class="text-white" x="100" y="344" text-anchor="middle">异常处理 / 取消 / 退款</text>
  <path class="arrow" d="M100 368 L100 392" />
  <path class="arrow" d="M100 392 L100 432" />

  <!-- Inventory management -->
  <rect class="box" x="110" y="468" width="160" height="68" rx="10"/>
  <text class="text-white" x="190" y="498" text-anchor="middle">库存管理</text>
  <text class="small" x="190" y="516" text-anchor="middle">(调整、实时监测)</text>
  <path class="arrow" d="M100 432 L190 468" />
  <path class="arrow" d="M260 456 L190 468" />

  <!-- Decision: low stock? -->
  <g transform="translate(150,556)">
    <polygon class="diamond" points="60,0 90,30 60,60 30,30"/>
    <text class="text-white" x="60" y="36" text-anchor="middle">库存是否低于阈值？</text>
  </g>
  <path class="arrow" d="M190 536 L190 556" />

  <!-- No -> continue -->
  <rect class="box" x="230" y="620" width="110" height="48" rx="8"/>
  <text class="text-white" x="285" y="650" text-anchor="middle">继续运营</text>
  <path class="arrow" d="M190 592 L230 646" />

  <!-- Yes -> inventory warning -->
  <rect class="box" x="30" y="620" width="120" height="48" rx="8"/>
  <text class="text-white" x="90" y="650" text-anchor="middle">库存预警</text>
  <path class="arrow" d="M190 592 L120 646" />

  <!-- AI recommendation -->
  <rect class="box-light" x="30" y="684" width="200" height="68" rx="10"/>
  <text class="text-dark" x="130" y="714" text-anchor="middle">AI 智能补货推荐</text>
  <text class="text-dark" x="130" y="734" text-anchor="middle">预测 + 建议（批处理约 60s）</text>
  <path class="arrow" d="M120 736 L120 768" />

  <!-- Procurement -->
  <rect class="box" x="80" y="780" width="120" height="56" rx="8"/>
  <text class="text-white" x="140" y="812" text-anchor="middle">采购 / 补货</text>
  <path class="arrow" d="M140 836 L140 864" />

  <!-- Loop back to supplier supply -->
  <path class="arrow" d="M140 900 L40 900 L40 216" />

  <!-- System boundary note (for svg) -->
  <text class="note" x="12" y="948">系统边界：仓库内部管理中台；不涉及电商前台与外部物流对接。</text>
</svg>

