<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="520" height="320" viewBox="0 0 520 320" role="img" aria-label="系统用例图 - 系统管理员与主要用例">
  <style>
    .actor { stroke:#334155; stroke-width:2; fill:none; }
    .actor-text { font-family: Arial, sans-serif; font-size:13px; fill:#0b1220; }
    .oval { fill:#0b5ed7; stroke:#073b6b; stroke-width:1.6; rx:24; }
    .oval-text { font-family: "Helvetica Neue", Arial, sans-serif; font-size:13px; fill:#ffffff; }
    .line { stroke:#334155; stroke-width:2; fill:none; }
    .dashed { stroke:#334155; stroke-width:1.6; stroke-dasharray:6 4; fill:none; }
    .note { font-family: Arial, sans-serif; font-size:12px; fill:#42526e; }
    .ai-box { fill:#ffffff; stroke:#0b5ed7; stroke-width:1.6; rx:6; }
    .ai-text { font-family: Arial, sans-serif; font-size:12px; fill:#0b1220; }
    .extend-label { font-family: Arial, sans-serif; font-size:11px; fill:#64748b; }
  </style>

  <!-- Actor (left) -->
  <g transform="translate(24,40)">
    <circle cx="16" cy="16" r="8" class="actor" />
    <line x1="16" y1="24" x2="16" y2="48" class="actor" />
    <line x1="16" y1="32" x2="4" y2="40" class="actor" />
    <line x1="16" y1="32" x2="28" y2="40" class="actor" />
    <text x="48" y="22" class="actor-text">系统管理员</text>
  </g>

  <!-- Use cases (vertical, center) -->
  <g transform="translate(140,28)">
    <ellipse class="oval" cx="200" cy="24" rx="120" ry="22"/>
    <text class="oval-text" x="200" y="28" text-anchor="middle">登录系统</text>

    <ellipse class="oval" cx="200" cy="72" rx="120" ry="22"/>
    <text class="oval-text" x="200" y="76" text-anchor="middle">商品管理</text>

    <ellipse class="oval" cx="200" cy="120" rx="120" ry="22"/>
    <text class="oval-text" x="200" y="124" text-anchor="middle">订单管理</text>

    <ellipse class="oval" cx="200" cy="168" rx="120" ry="22"/>
    <text class="oval-text" x="200" y="172" text-anchor="middle">供应商管理</text>

    <ellipse class="oval" cx="200" cy="216" rx="120" ry="22"/>
    <text class="oval-text" x="200" y="220" text-anchor="middle">库存管理</text>

    <ellipse class="oval" cx="200" cy="264" rx="120" ry="22"/>
    <text class="oval-text" x="200" y="268" text-anchor="middle">查看统计报表</text>
  </g>

  <!-- Connector lines from actor to use cases -->
  <path class="line" d="M56 44 L140 24" />
  <path class="line" d="M56 44 L140 72" />
  <path class="line" d="M56 44 L140 120" />
  <path class="line" d="M56 44 L140 168" />
  <path class="line" d="M56 44 L140 216" />
  <path class="line" d="M56 44 L140 264" />

  <!-- AI feature boxes on the right with <<extend>> dashed links -->
  <g transform="translate(370,48)">
    <rect class="ai-box" x="0" y="12" width="120" height="36" rx="6" />
    <text class="ai-text" x="60" y="34" text-anchor="middle">AI 生成商品描述</text>
  </g>

  <g transform="translate(370,196)">
    <rect class="ai-box" x="0" y="12" width="120" height="36" rx="6" />
    <text class="ai-text" x="60" y="34" text-anchor="middle">AI 补货推荐</text>
  </g>

  <!-- dashed extend lines -->
  <path class="dashed" d="M320 80 L370 80" />
  <text class="extend-label" x="320" y="72" text-anchor="end">&lt;&lt;extend&gt;&gt;</text>

  <path class="dashed" d="M320 228 L370 228" />
  <text class="extend-label" x="320" y="220" text-anchor="end">&lt;&lt;extend&gt;&gt;</text>

</svg>


